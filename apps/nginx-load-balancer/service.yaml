apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy
spec:
  type: LoadBalancer
  selector:
    app: nginx-proxy
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
    - name: rtmps
      port: 1936
      targetPort: 1936
    - name: webrtc
      port: 8889
      targetPort: 8889
    - name: webrtc_udp
      port: 8189
      targetPort: 8189
