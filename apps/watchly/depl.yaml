apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchly
  namespace: watchly
  labels:
    app: watchly
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watchly
  template:
    metadata:
      labels:
        app: watchly
        version: v1
    spec:
      containers:
      - name: watchly
        image: incept1on/whatchly:front
        ports:
        - containerPort: 80
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
