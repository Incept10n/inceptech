apiVersion: apps/v1
kind: Deployment
metadata:
  name: siyuan
  namespace: siyuan
  labels:
    app: siyuan
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: siyuan
  template:
    metadata:
      labels:
        app: siyuan
      annotations:
        # Forces pod restart when secret changes (so new accessAuthCode is picked up)
        secret/checksum: "managed-by-eso"
    spec:
      containers:
        - name: siyuan
          image: b3log/siyuan:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              exec /opt/siyuan/entrypoint.sh \
                --workspace=/siyuan/workspace/ \
                --accessAuthCode="${ACCESS_AUTH_CODE}"
          ports:
            - name: http
              containerPort: 6806
              protocol: TCP
          env:
            - name: TZ
              value: "Europe/Moscow"
            - name: ACCESS_AUTH_CODE
              valueFrom:
                secretKeyRef:
                  name: siyuan-secrets
                  key: accessAuthCode
          volumeMounts:
            - name: workspace
              mountPath: /siyuan/workspace
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: siyuan-workspace
      restartPolicy: Always
