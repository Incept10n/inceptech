apiVersion: v1
kind: Service
metadata:
  name: ts3-service
  labels:
    app: ts3
spec:
  ports:
    - name: voice
      port: 9987
      targetPort: 9987
      protocol: UDP
    - name: query
      port: 10011
      targetPort: 10011
      protocol: TCP
    - name: filetransfer
      port: 30033
      targetPort: 30033
      protocol: TCP
  clusterIP: None # Headless сервис для StatefulSet
  selector:
    app: ts3
