apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediamtx
  namespace: displayify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediamtx
  template:
    metadata:
      labels:
        app: mediamtx
    spec:
      initContainers:
        - name: render-config
          image: incept1on/displayify:back
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              set -eu
              python3 -m venv .venv
              source .venv/bin/activate
              pip install --quiet --disable-pip-version-check jinja2-cli

              env > /tmp/vars.env

              echo "Rendering mediamtx.yml.j2 -> /rendered/mediamtx.yml"
              jinja2 --strict --format=env mediamtx.yml.j2 /tmp/vars.env > /rendered/mediamtx.yml
              echo "---- rendered ----"
              cat /rendered/mediamtx.yml
          volumeMounts:
            - name: rendered
              mountPath: /rendered
          env:
            - name: RTMP_USER
              valueFrom:
                secretKeyRef:
                  name: displayify-secrets
                  key: RTMP_USER
            - name: RTMP_PASS
              valueFrom:
                secretKeyRef:
                  name: displayify-secrets
                  key: RTMP_PASS
      containers:
        - name: mediamtx
          image: incept1on/displayify:back
          imagePullPolicy: Always
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          ports:
            - containerPort: 1935
            - containerPort: 1936
            - containerPort: 8889
            - name: webrtc-udp
              containerPort: 8189
              protocol: UDP
          volumeMounts:
            - name: tls
              mountPath: /etc/nginx/pki
              readOnly: true
            - name: rendered
              mountPath: /rendered
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: tls
          secret:
            secretName: displayify-secrets
            items:
              - key: server.crt
                path: server.crt
              - key: server.key
                path: server.key
        - name: rendered
          emptyDir: {}
