apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-config
  namespace: displayify
data:
  mediamtx.yml: |
    # глобально
    logLevel: info

    # RTSPS (RTSP over TLS) с проверкой клиентских сертов
    rtspEncryption: "strict"
    rtspServerCert: /etc/mediamtx/pki/tls.crt
    rtspServerKey: /etc/mediamtx/pki/tls.key
    # mTLS для публишеров (OBS)
    authMethod: internal
    # либо используй authInternalUsers + clientCert через прокси
    # mediamtx умеет mTLS на уровне TLS handshake через "tlsClientCAs" в новых версиях:
    # rtspsTLSClientCAs: [/etc/mediamtx/pki/ca.crt]

    rtmpEncryption: "strict"
    rtmpServerCert: /etc/mediamtx/pki/tls.crt
    rtmpServerKey: /etc/mediamtx/pki/tls.key

    paths:
      all_others:


