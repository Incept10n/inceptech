apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: udp-joker
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Incept10n/inceptech.git
    targetRevision: master
    path: apps/udp-joker
  destination:
    server: https://kubernetes.default.svc
    namespace: udp-joker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - '.metadata.finalizers'
        - '.status'
